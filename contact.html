<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Peak — Contact</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    


    <!--CSS LINK-->
    <link rel="stylesheet" href="./css/contact.css">
    <link rel="stylesheet" href="./css/nav.css">
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <!---Hero SECTION---->

    <section class="Hero">
        <H1>VISIT US</H1>
        <P>WE'D LOVE TO HEAR FROM YOU</P>
        <div class="overlay"></div>
    </section>


    <!---Contact Section---->
    <section id="Contact">
        <div class="container">
            <div class="contact-address">
                <p>
                    <strong>Address:</strong>12 Marina Street, GRA Phase 2 Port Harcourt, Rivers State
                </p>
                    <a href="tel:+234">call us :+234801234565</a>

                <table border="2">
                    <thead>
                        <tr>
                            <th>OPENING HOURS</th>
                        </tr> 
                    </thead>
                </table>

                
                <tbody>
                    <tr>
                        <td>Monday --- Thursday</td>
                        <td>12.00pm --- 10.00pm</td>
                    </tr>

                    <tr>
                        <td>Friday</td>
                        <td>12.00pm --- 11.00pm</td>
                    </tr>
                    <tr>
                        <td>Saturday</td>
                        <td>11.am --- 11.00pm</td>
                    </tr>

                    <tr>
                        <td>Saturday</td>
                        <td>11..00am --- 9.00pm</td>
                    </tr>
                </tbody>
            </div>


            <div class="contact-form">
                <form>
                    <div class="contact-info">
                        <div>
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name">
                        </div>

                        <div>
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="You@email.com">
                        </div>

                        <div>
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+234">
                        </div>

                        <div>
                            <label for="guests">Number of Guests</label>
                            <input type="number" id="guests" name="guests" placeholder="e.g 4">
                        </div>

                        <div>
                            <label for="date">Preferred Date</label>
                            <input type="date" id="date" name="date" placeholder="DD/MM/YY">
                        </div>

                        <div>
                            <label for="time">preferred Time</label>
                            <input type="number" id="time" name="time" placeholder="e.g 7.00 PM">
                        </div>
                    </div>

                    <div class="request">
                        <label for="request">Special Request</label>
                        <textarea id="request" name="request" rows="10" cols="50"></textarea>
                    </div>

                    <button class="btn-primary">
                        SUBMIT RESERVATION
                    </button>
                </form>
            </div>
        </div>

        <div>
            <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d63609.694805906096!2d6.964164798639937!3d4.837530405273485!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1srestaurant%20in%20port%20harcourt!5e0!3m2!1sen!2sng!4v1776549426567!5m2!1sen!2sng" width="1500" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </section>

    
</body>
</html>
